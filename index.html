<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캐주얼 한옥 카페</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #faf8f5;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #fff;
      padding: 30px 20px;
      text-align: center;
      border-bottom: 2px solid #f2e3e5;
    }
    h1 {
      color: #8c736d;
      margin-bottom: 5px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .hero {
      text-align: center;
      margin-bottom: 50px;
    }
    .hero img {
      width: 100%;
      max-width: 700px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    /* VR 화면의 크기와 모양을 잡아주는 코드 */
    #panorama {
      width: 100%;
      height: 400px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 50px;
    }
    .menu-section {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .menu-item {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      width: 45%;
    }
    .menu-item img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .highlight {
      color: #d88c9a;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>☕ 고즈넉한 여유, 캐주얼 한옥 카페</h1>
    <p>일상의 복잡함을 벗어나 툇마루에서 쉬어가세요</p>
  </header>

  <div class="container">
    <div class="hero">
      <img src="image.jpg" alt="카페 전경">
      <h2>따뜻한 봄날의 휴식처</h2>
      <p>정성스럽게 내린 커피와 쉼이 있는 공간입니다.</p>
    </div>

    <h3 style="text-align: center; color: #8c736d; margin-bottom: 20px;">👀 카페 내부 360도 둘러보기 👀</h3>
    <div id="panorama"></div>

    <h3 style="text-align: center; color: #8c736d; margin-bottom: 30px;">🌸 시즌 시그니처 메뉴 🌸</h3>
    <div class="menu-section">
      <div class="menu-item">
        <img src="image1.jpg" alt="시그니처 메뉴">
        <h4 class="highlight">시즌 한정: 벚꽃 라떼</h4>
        <p>달콤한 크림과 은은한 봄 내음이 어우러진 시그니처 음료</p>
      </div>
      <div class="menu-item">
        <img src="image2.png" alt="수제 디저트">
        <h4>수제 디저트</h4>
        <p>매일 아침 매장에서 직접 굽는 신선한 구움과자</p>
      </div>
    </div>
  </div>

  <script>
    pannellum.viewer('panorama', {
      "type": "equirectangular",
      "panorama": "vr.jpg",
      "autoLoad": true
    });
  </script>
</body>
</html>
