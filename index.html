<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>여행 예약 앱 UI 구현</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* 전체 스타일 초기화 */
    :root {
      --primary-color: #00b4d8; /* 메인 파란색 */
      --secondary-color: #ff6b6b; /* 포인트 분홍색 */
      --text-color: #333;
      --bg-color: #f7f9fc; /* 연한 배경색 */
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* 컨테이너 스타일 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    /* 앱 화면 카드 스타일 */
    .app-screen {
      width: 360px;
      height: 640px;
      background-color: #fff;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* 헤더 스타일 */
    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
    }
    header .profile-icon {
      width: 30px;
      height: 30px;
      background-color: #ccc;
      border-radius: 50%;
    }
    /* 메인 콘텐츠 스타일 */
    main {
      flex: 1;
      padding: 0 20px;
      overflow-y: auto;
    }
    /* 검색 바 스타일 */
    .search-bar {
      background-color: #eee;
      border-radius: 20px;
      padding: 10px 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-bar input {
      border: none;
      background: none;
      flex: 1;
      font-size: 0.9rem;
    }
    .search-bar .search-icon {
      width: 15px;
      height: 15px;
      background-color: #777;
    }
    /* 카테고리 탭 스타일 */
    .category-tabs {
      list-style: none;
      padding: 0;
      margin: 0 -20px 20px -20px;
      display: flex;
      gap: 5px;
    }
    .category-tabs li {
      padding: 10px 20px;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 10px;
    }
    .category-tabs li.active {
      background-color: var(--primary-color);
      color: #fff;
    }
    /* 콘텐츠 카드 스타일 */
    .content-card {
      background-color: #fff;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .content-card-img {
      width: 100%;
      height: 150px;
      background-color: #eee;
      position: relative;
    }
    .content-card-img .discount-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: var(--secondary-color);
      color: #fff;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    .content-card-text {
      padding: 15px;
    }
    .content-card-text h3 {
      font-size: 1rem;
      margin-bottom: 5px;
    }
    .content-card-text p {
      font-size: 0.8rem;
      color: #777;
    }
    /* 하단 내비게이션 바 스타일 */
    footer {
      padding: 15px 20px;
      background-color: #fff;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer .nav-icon {
      width: 20px;
      height: 20px;
      background-color: #ccc;
    }
    footer .nav-icon.active {
      background-color: var(--primary-color);
    }

    /* 🌟 버튼 호버 효과 추가 */
    .search-btn:hover {
      background-color: #333;
    }
    .price-btn:hover, .filter-btn:hover {
      background-color: #eee;
    }
    .select-btn:hover {
      background-color: #333;
    }
    .toggle-btn.active:hover {
      background-color: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="app-screen app-screen--home">
      <header>
        <h1>Hi, Mike!</h1>
        <div class="profile-icon"></div>
      </header>
      <main>
        <div class="search-bar">
          <input type="text" placeholder="New York, US">
          <div class="search-icon"></div>
        </div>
        <ul class="category-tabs">
          <li class="active">All</li>
          <li>Asia</li>
          <li>America</li>
          <li>Europe</li>
        </ul>
        <div class="content-card">
          <div class="content-card-img">
            <div class="discount-tag">20% off</div>
          </div>
          <div class="content-card-text">
            <h3>London, England</h3>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
      </main>
      <footer>
        <div class="nav-icon active"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
      </footer>
    </div>

    <div class="app-screen app-screen--pick">
      <header>
        <div class="back-icon"></div>
        <h1>Pick Your Trip</h1>
      </header>
      <main>
        <ul class="category-tabs">
          <li>Hotel</li>
          <li class="active">Flight</li>
          <li>More</li>
        </ul>
        <div class="toggle-btns">
          <button class="toggle-btn active">Roundtrip</button>
          <button class="toggle-btn">Oneway</button>
        </div>
        <div class="input-fields">
          <div class="input-field">
            <label>From</label>
            <input type="text" value="London, ENG">
          </div>
          <div class="input-field">
            <label>To</label>
            <input type="text" value="New York, US">
          </div>
          <div class="input-field input-field--date">
            <label>Departure</label>
            <input type="text" value="Wed, 25 Nov 20">
          </div>
          <div class="input-field input-field--date">
            <label>Return</label>
            <input type="text" value="Wed, 25 Nov 20">
          </div>
          <div class="input-field input-field--class">
            <label>Class</label>
            <input type="text" value="Business">
          </div>
          <div class="input-field input-field--passenger">
            <label>Passenger</label>
            <input type="text" value="4">
          </div>
        </div>
        <button class="search-btn">Search</button>
      </main>
      <footer>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
      </footer>
    </div>

    <div class="app-screen app-screen--result">
      <header>
        <div class="back-icon"></div>
        <h1>Flight</h1>
      </header>
      <main>
        <div class="flight-info">
          <p>London, ENG</p>
          <p>New York, US</p>
          <p>Wed, 25 Nov 20</p>
        </div>
        <div class="sort-filter-btns">
          <button class="price-btn active">Price</button>
          <button class="filter-btn">Filter</button>
        </div>
        <div class="flight-card">
          <div class="flight-card-logo"></div>
          <div class="flight-card-time">
            <p>ENG</p>
            <p>06:22 AM</p>
          </div>
          <div class="flight-card-duration">
            <p>6h 30m</p>
